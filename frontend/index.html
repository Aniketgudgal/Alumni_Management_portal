<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Management Portal</title>
    <!-- Modern Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class='bx bxs-graduation logo-icon'></i>
                <h2 class="logo-text">AlumniPortal</h2>
            </div>
            <ul class="nav-links">
                <li><a href="#" data-route="dashboard" class="active"><i class='bx bxs-dashboard'></i> Dashboard</a></li>
                <li><a href="#" data-route="directory"><i class='bx bxs-contact'></i> Directory</a></li>
                <li><a href="#" data-route="events"><i class='bx bxs-calendar-event'></i> Events</a></li>
                <li><a href="#" data-route="mentorship"><i class='bx bxs-user-voice'></i> Mentorship</a></li>
                <li><a href="#" data-route="gallery"><i class='bx bxs-photo-album'></i> Gallery</a></li>
                <li><a href="#" data-route="jobs"><i class='bx bxs-briefcase'></i> Jobs</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" class="logout-btn"><i class='bx bx-log-out'></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class='bx bx-search'></i>
                    <input type="text" placeholder="Search alumni, events...">
                </div>
                <div class="user-info">
                    <div class="notification-bell">
                        <i class='bx bxs-bell'></i>
                        <span class="badge">3</span>
                    </div>
                    <div class="profile-dropdown">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff" alt="Profile" class="avatar">
                        <span>Admin</span>
                        <i class='bx bx-chevron-down'></i>
                    </div>
                </div>
            </header>

            <!-- Dynamic Views Container -->
            <div id="view-container" class="view-container">
                <!-- Content will be injected here by app.js -->
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
