<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Alumni Management Portal</title>
    <meta name="description" content="Alumni Dashboard - Manage your profile, network with alumni, chat with batchmates, and explore opportunities.">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
<style>
/* ===== CHAT PAGE INTERNAL OVERRIDES ===== */
.page-title-bar { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; margin-bottom:24px; }
.page-title-bar h1 { font-size:28px; font-weight:800; display:flex; align-items:center; }
.page-title-bar p { color:var(--text-secondary); font-size:14px; margin-top:4px; }
.chat-header-stats { display:flex; gap:8px; flex-wrap:wrap; }
.chat-stat-pill { display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; background:var(--bg-body); border:1px solid var(--border); font-size:13px; font-weight:600; color:var(--text-secondary); }
.chat-stat-pill.online-pill { color:#10b981; }
.chat-stat-pill i { font-size:14px; color:var(--primary); }
.chat-stat-pill.online-pill i { color:#10b981; }
.chat-layout { display:grid; grid-template-columns:320px 1fr; border-radius:var(--radius-lg); border:1px solid var(--border); background:var(--bg-card); overflow:hidden; min-height:540px; }
.chat-contacts { border-right:1px solid var(--border); display:flex; flex-direction:column; }
.chat-contacts-header { padding:20px 16px 12px; }
.chat-contacts-header h3 { font-size:16px; font-weight:700; margin-bottom:10px; }
.chat-tabs { display:flex; gap:4px; }
.chat-tab { padding:6px 12px; border:none; background:var(--bg-body); border-radius:var(--radius-sm); font-size:12px; font-weight:600; color:var(--text-muted); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:4px; }
.chat-tab.active { background:var(--primary); color:#fff; }
.chat-tab:hover:not(.active) { background:var(--border); }
.chat-search { padding:0 16px 12px; }
.chat-list { flex:1; overflow-y:auto; }
.chat-contact-item { display:flex; align-items:center; gap:12px; padding:12px 16px; cursor:pointer; transition:background 0.2s; border-left:3px solid transparent; }
.chat-contact-item:hover { background:rgba(79,70,229,0.04); }
.chat-contact-item.active { background:rgba(79,70,229,0.08); border-left-color:var(--primary); }
.cc-avatar { width:44px; height:44px; border-radius:50%; object-fit:cover; }
.cc-status { position:absolute; bottom:1px; right:1px; width:10px; height:10px; border-radius:50%; background:#10b981; border:2px solid var(--bg-card); }
.cc-meta { flex:1; min-width:0; }
.cc-meta h4 { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cc-meta p { font-size:12px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.cc-time { font-size:11px; color:var(--text-muted); white-space:nowrap; flex-shrink:0; }
.chat-main { display:flex; flex-direction:column; }
.chat-main-header { display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid var(--border); }
.chat-main-header img { width:40px; height:40px; border-radius:50%; }
.ch-avatar-wrap { position:relative; flex-shrink:0; }
.ch-online-dot { position:absolute; bottom:2px; right:2px; width:10px; height:10px; border-radius:50%; background:#10b981; border:2px solid var(--bg-card); }
.ch-info h4 { font-size:15px; font-weight:700; }
.ch-status { font-size:12px; font-weight:500; }
.ch-status.online { color:#10b981; }
.ch-status.offline { color:var(--text-muted); }
.ch-actions { margin-left:auto; display:flex; gap:6px; }
.chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:8px; background:var(--bg-body); }
.chat-date-divider { text-align:center; padding:16px 0; position:relative; }
.chat-date-divider::before { content:''; position:absolute; left:10%; right:10%; top:50%; height:1px; background:var(--border); }
.chat-date-divider span { position:relative; z-index:1; background:var(--bg-body); padding:4px 16px; font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; border-radius:12px; border:1px solid var(--border); }
.chat-msg { display:flex; flex-direction:column; max-width:70%; }
.chat-msg.sent { align-self:flex-end; }
.chat-msg.received { align-self:flex-start; }
.msg-bubble { padding:10px 16px; border-radius:16px; font-size:14px; line-height:1.5; }
.chat-msg.sent .msg-bubble { background:var(--primary); color:#fff; border-bottom-right-radius:4px; }
.chat-msg.received .msg-bubble { background:var(--bg-card); border:1px solid var(--border); border-bottom-left-radius:4px; }
.msg-meta { display:flex; align-items:center; gap:4px; margin-top:4px; }
.msg-time { font-size:11px; color:var(--text-muted); }
.chat-msg.sent .msg-meta { justify-content:flex-end; }
.typing-indicator { display:flex; align-items:center; gap:8px; padding:8px 16px; color:var(--text-muted); font-size:13px; }
.typing-dots { display:flex; gap:3px; }
.typing-dots span { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:typingBounce 1.4s infinite; }
.typing-dots span:nth-child(2) { animation-delay:0.2s; }
.typing-dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4;} 30%{transform:translateY(-6px);opacity:1;} }
.chat-input-area { padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; background:var(--bg-card); }
.chat-input-area input { flex:1; padding:10px 16px; border:1.5px solid var(--border); border-radius:24px; font-size:14px; background:var(--bg-body); color:var(--text-primary); outline:none; }
.chat-input-area input:focus { border-color:var(--primary); }
.send-btn { width:40px; height:40px; border-radius:50%; border:none; background:var(--primary); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; transition:all 0.2s; flex-shrink:0; }
.send-btn:hover { transform:scale(1.05); background:var(--primary-hover); }
.chat-attach-btn { flex-shrink:0; }

@media(max-width:768px) {
    .chat-layout { grid-template-columns:1fr; min-height:auto; }
    .chat-contacts { max-height:240px; border-right:none; border-bottom:1px solid var(--border); }
    .chat-main { height:460px; }
    .chat-messages { padding:16px; }
    .chat-msg { max-width:88%; }
    .chat-header-stats { display:none; }
    .chat-tab i { display:none; }
    .chat-input-area { padding:12px 16px; }
    .ch-actions { gap:4px; }
    .page-title-bar h1 { font-size:22px; }
    .chat-main-header { padding:12px 16px; flex-wrap:wrap; }
}
@media(max-width:480px) {
    .chat-main { height:380px; }
    .chat-contacts { max-height:200px; }
}
</style>
</head>
<body>

            <div class="sidebar-user">

                    <img src="https://i.pravatar.cc/150?img=3" alt="User Avatar" id="sidebarAvatar">
                    <div class="user-meta">
                        <h4 id="sidebarUserName">Shubham K.</h4>
                        <span id="sidebarUserRole">Alumni Ģ Batch 2020</span>
                    </div>
                </div>
            </div>

            <nav class="dash-nav">
                <span class="nav-section-label">Main</span>
                <a href="dashboard.html" class="dash-nav-link active" data-view="overview">

                </a>

                <span class="nav-section-label">Communication</span>

                <a href="notifications.html" class="dash-nav-link" data-view="notifications">

                <span class="nav-section-label">Discover</span>

                </a>
                <a href="gallery.html" class="dash-nav-link" data-view="gallery">

            </nav>

            <div class="dash-sidebar-footer">

                    <span>Logout</span>
                </a>
            </div>

        <!-- ========== MAIN CONTENT ========== -->
        <main class="dash-main">

            <!-- Topbar -->
            <header class="dash-topbar">
                <div style="display:flex;align-items:center;gap:16px;">
                    <button class="sidebar-toggle" onclick="document.getElementById('dashSidebar').classList.toggle('open')">

                        <img src="https://i.pravatar.cc/150?img=3" alt="Profile">
